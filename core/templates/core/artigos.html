{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Artigos | Rita Temporin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top shadow-sm">
<div class="container">
    <a class="navbar-brand" href="/">
        <img src="{% static 'imagens/logo.png' %}" alt="Logo">
    </a>
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/">Início</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'artigos' %}">Artigos</a></li>
        </ul>
    </div>
</div>
</nav>

<section class="hero" style="min-height:60vh;">
<div class="container">
    <h1>Artigos</h1>
    <p class="mt-3">
        Conteúdos informativos sobre desenvolvimento, aprendizagem e bem-estar emocional.
    </p>
</div>
</section>

<section>
<div class="container">
    <div class="row g-4">

        {% for artigo in artigos %}
        <div class="col-md-6 col-lg-4">
            <div class="card-gold h-100">
                <h5>{{ artigo.titulo }}</h5>
                <p class="mt-3">{{ artigo.resumo }}</p>
                <a href="{% url 'artigo_detalhe' artigo.id %}" class="btn btn-gold mt-3">
                    Ler artigo
                </a>
            </div>
        </div>
        {% endfor %}

    </div>
</div>
</section>

</body>
</html>
